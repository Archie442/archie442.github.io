<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>404 — Page introuvable</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#09090b;

  --surface:
    rgba(18,18,20,.78);

  --surface-hover:
    rgba(24,24,27,.92);

  --border:
    rgba(255,255,255,.06);

  --text:#f5f5f5;

  --muted:#8b8b93;

  --radius:
    clamp(22px,2vw,34px);
}

html,
body{

  width:100%;
  height:100%;
}

body{

  font-family:"Inter",sans-serif;

  background:var(--bg);

  color:var(--text);

  overflow:hidden;

  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:
    clamp(14px,1vw,20px);
}

/* ========================= */
/* NOISE */
/* ========================= */

body::before{

  content:"";

  position:fixed;
  inset:0;

  opacity:.03;

  pointer-events:none;

  background-image:
    radial-gradient(
      rgba(255,255,255,1) .5px,
      transparent .5px
    );

  background-size:6px 6px;
}

/* ========================= */
/* BACKGROUND GLOW */
/* ========================= */

.glow{

  position:absolute;

  width:600px;
  height:600px;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,.04),
      transparent 70%
    );

  filter:blur(60px);

  animation:float 8s ease-in-out infinite;
}

@keyframes float{

  0%{
    transform:
      translateY(0px)
      translateX(0px);
  }

  50%{
    transform:
      translateY(-20px)
      translateX(10px);
  }

  100%{
    transform:
      translateY(0px)
      translateX(0px);
  }
}

/* ========================= */
/* CARD */
/* ========================= */

.container{

  width:min(1100px,100%);
  height:min(700px,100%);

  display:grid;

  grid-template-columns:
    1.2fr
    .8fr;

  gap:
    clamp(14px,1vw,18px);

  z-index:2;
}

/* ========================= */
/* MAIN PANEL */
/* ========================= */

.main-card{

  background:var(--surface);

  border:
    1px solid var(--border);

  border-radius:var(--radius);

  padding:
    clamp(24px,2vw,42px);

  backdrop-filter:blur(20px);

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  overflow:hidden;

  position:relative;
}

.topbar{

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:12px;

  flex-wrap:wrap;
}

.status{

  display:flex;
  align-items:center;
  gap:10px;
}

.dot{

  width:9px;
  height:9px;

  border-radius:50%;

  background:#8fff9c;

  box-shadow:0 0 12px #8fff9c;
}

.status span{

  color:var(--muted);

  font-size:
    clamp(12px,.8vw,14px);
}

.badge{

  padding:
    10px 14px;

  border-radius:999px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.05);

  font-size:
    clamp(11px,.8vw,13px);

  color:#d7d7d7;
}

/* ========================= */
/* CONTENT */
/* ========================= */

.content{

  margin-top:auto;
}

.error{

  font-size:
    clamp(7rem,15vw,14rem);

  line-height:.85;

  font-weight:800;

  letter-spacing:-8px;

  margin-bottom:
    clamp(18px,2vw,28px);
}

.content h1{

  font-size:
    clamp(1.6rem,2vw,2.8rem);

  line-height:1.1;

  letter-spacing:-2px;

  margin-bottom:18px;
}

.content p{

  max-width:600px;

  color:var(--muted);

  line-height:1.7;

  font-size:
    clamp(.95rem,1vw,1.05rem);
}

/* ========================= */
/* ACTIONS */
/* ========================= */

.actions{

  display:flex;
  gap:14px;

  flex-wrap:wrap;

  margin-top:
    clamp(28px,3vh,40px);
}

.actions a{

  text-decoration:none;

  color:white;

  padding:
    16px 22px;

  border-radius:18px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.05);

  transition:.25s ease;

  font-size:
    clamp(.85rem,.9vw,.95rem);
}

.actions a:hover{

  background:white;

  color:black;

  transform:translateY(-2px);
}

/* ========================= */
/* SIDE PANEL */
/* ========================= */

.side{

  display:grid;

  grid-template-rows:
    1fr
    1fr;

  gap:
    clamp(14px,1vw,18px);
}

.side-card{

  background:var(--surface);

  border:
    1px solid var(--border);

  border-radius:var(--radius);

  padding:
    clamp(22px,1.8vw,30px);

  backdrop-filter:blur(20px);

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  overflow:hidden;
}

/* ========================= */
/* CODE BLOCK */
/* ========================= */

.code{

  font-family:
    monospace;

  color:#d4d4d4;

  line-height:1.8;

  font-size:
    clamp(.8rem,.9vw,.95rem);
}

.code span{

  color:#8b8b93;
}

/* ========================= */
/* LINKS */
/* ========================= */

.links{

  display:flex;
  flex-direction:column;

  gap:12px;
}

.links a{

  text-decoration:none;

  color:#d9d9d9;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:
    16px 18px;

  border-radius:18px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.05);

  transition:.2s ease;
}

.links a:hover{

  background:
    rgba(255,255,255,.09);

  color:white;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media (max-width:900px){

  body{
    overflow-y:auto;
  }

  .container{

    grid-template-columns:1fr;

    height:auto;
  }

  .side{

    grid-template-columns:1fr;
  }
}

@media (max-width:640px){

  body{

    padding:12px;

    overflow-y:auto;
  }

  .container{

    gap:12px;
  }

  .main-card,
  .side-card{

    border-radius:24px;
  }

  .error{

    font-size:6rem;

    letter-spacing:-4px;
  }

  .actions{

    flex-direction:column;
  }

  .actions a{

    width:100%;
    text-align:center;
  }
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

  <!-- MAIN -->
  <section class="main-card">


    <div class="content">

      <div class="error">
        404
      </div>

      <h1>
        Not Found
      </h1>

      <p>
        La page à laquelle vous tentez d'accéder n'existe pas/plus ou ne se trouve pas à cet emplacement.
        Essayez de vérifier l'URL entrée ou demandez à la personne qui vous a fourni ce lien de le mettre à jour.
      </p>

      <div class="actions">

        <a href="/">
          Retouner à l'accueil
        </a>

        <a href="/contact">
          Contact
        </a>

      </div>

    </div>

  </section>

  <!-- SIDE -->
  <aside class="side">

    <div class="side-card">

      <div class="code">
        
        <center>
            <h1 style="font-size: 160px;">;(</h1>
        </center>
    
    </div>

    </div>

    <div class="side-card">

      <div class="links">

        

      </div>

    </div>

  </aside>

</div>

</body>
</html>
